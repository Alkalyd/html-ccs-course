<!DOCTYPE html>
<html>

<head>
  <title>Flexbox Practice</title>
</head>

<body>
  <div style="
      display: flex;
      flex-direction: row;
      ">

    <div style="background-color: lightblue;">div1 flex</div>
    <div style="background-color: lightpink;">div2 <p>text</p>
    </div>

  </div>

  <div style="
    margin-top: 30px;
      display: flex;
      flex-direction: row;
      ">

    <div style="background-color: lightblue; width: 100px;">100px</div>
    <div style="background-color: lightpink; flex: 1">flex 1</div>

  </div>

  <div style="
    margin-top: 30px;
      display: flex;
      flex-direction: row;
      ">

    <div style="background-color: lightblue; width: 100px;">100px</div>
    <div style="background-color: lightpink; flex: 1">flex 1</div>
    <div style="background-color: lightblue; flex: 2;">flex 2</div>

  </div>

  <div style="
    margin-top: 30px;
      display: flex;
      flex-direction: row;
      ">

    <div style="background-color: lightpink; flex: 1">flex 1</div>
    <div style="background-color: lightblue; width: 100px;">100px</div>
    <div style="background-color: lightblue; flex: 2;">flex 2</div>


  </div>

  <div style="
    margin-top: 30px;
    height: 70px;
    border-width: 1px;
    border-style: solid;
    border-color: gray;
    display: flex;
    flex-direction: row;
    justify-content: center;
      ">

    <div style="background-color: lightblue; width: 100px;">100px</div>
    <div style="background-color: lightpink; width: 100px;">100px</div>
    <div style="background-color: lightblue; width: 100px;;">100px</div>


  </div>

  <div style="
    margin-top: 30px;
    height: 70px;
    border-width: 1px;
    border-style: solid;
    border-color: gray;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
      ">

    <div style="background-color: lightblue; width: 100px;">100px</div>
    <div style="background-color: lightpink; width: 100px;">100px</div>
    <div style="background-color: lightblue; width: 100px;;">100px</div>


  </div>

  <div style="
    margin-top: 30px;
    height: 70px;
    border-width: 1px;
    border-style: solid;
    border-color: gray;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
      ">

    <div style="background-color: lightblue; width: 100px;">100px</div>
    <div style="background-color: lightpink; width: 100px;">100px</div>
    <div style="background-color: lightblue; width: 100px;;">100px</div>


  </div>

</body>

</html>

<!-- With flex box the elements take their width along with them and allows you to have flexable layout as compared to grid template
 colums that width are set into a fixed position so if you were to move a 100px box into a 1fr spot the 100px while being named 100px
 would then become 1fr while being named 100px. If you were to move a flex box into whichever position you choose, it's width would
 always remain -->
